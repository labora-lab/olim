# Docker Compose for main application with remote workers
# Use this when you want to run workers on separate machines
# This setup exposes the database for remote worker connections
# Usage: docker-compose -f docker-compose.remote-workers.yml up

x-app-base: &app-base
  image: olim:latest
  volumes:
    - ./:/app
    # - worker-data:/app/work
    # - upload-data:/app/uploads
    # - ./data:/app/data
  networks:
    - olim-es
  depends_on:
    - db
  restart: unless-stopped

# Environments
x-app-env: &app-env
  DB_HOST: "olim_db"
  DB_NAME: "${POSTGRES_DB}"
  DB_USER: "${POSTGRES_USER}"
  DB_PASSWORD: "${POSTGRES_PASSWORD}"
  DB_PORT: "${POSTGRES_PORT:-5432}"
  DEBUG: "${DEBUG:-false}"
  ES_SERVER: "http://olim_es:9200"
  WORK_PATH: /app/work
  LABELS: "${LABELS}"
  HELP_URL: "${HELP_URL}"
  REDIS_HOST: "${REDIS_HOST}"
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
  REDIS_PORT: "${REDIS_PORT:-6379}"

services:
  es:
    container_name: olim_es
    image: docker.elastic.co/elasticsearch/elasticsearch:8.7.0
    volumes:
      - es-data:/usr/share/elasticsearch/data
    environment:
      - node.name=olim_es
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
    mem_limit: 4G
    restart: unless-stopped
    networks:
      - olim-es

  db:
    container_name: olim_db
    image: postgres:15-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      # Expose database for remote worker connections
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - olim-es
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  olim:
    <<: *app-base
    container_name: olim
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - 42000:42000
    environment:
      <<: *app-env

  # No local worker - workers will connect remotely

volumes:
  es-data:
    driver: local
  postgres-data:
    driver: local
  worker-data:
    driver: local
  upload-data:
    driver: local

networks:
  olim-es:
    driver: bridge