{% extends "base.html" %}
{% block title %}{{ _('Initial configuration') }}{% endblock %}
{% block menu %}{% endblock %}
{% block menuicon %}{% endblock %}

{% block content %}
<div class="row">
    <div class="col s12 m8 offset-m2 card">
        <div class="card-content">
            <span class="card-title">{{ _('Create admin account') }}</span>
            <form method="POST" action="{{ url_for('init_config') }}">
                <div class="input-field">
                    <input id="username" type="text" name="username" required>
                    <label for="username">{{ _('Username') }}</label>
                </div>
                <div class="input-field">
                    <input id="name" type="text" name="name">
                    <label for="name">{{ _('Name') }}</label>
                </div>
                <div id="new" class="input-field">
                    <input id="new_password" type="password" name="new_password" required>
                    <label for="new_password">{{ _('New Password') }}</label>
                </div>
                <div id="text" class="input-field hidden">
                    <input id="new_password_text" type="text" name="new_password_text">
                    <label for="new_password_text">{{ _('New Password') }}</label>
                </div>
                <div id="check" class="input-field ">
                    <input id="password_check" type="password" name="password_check" required>
                    <label for="password_check">{{ _('Confirm Password') }}</label>
                </div>
                <div id="random">
                    <button class="btn btn-wide waves-effect waves-light grey darken-2" style="margin-bottom: 15px;"
                        type="button" onclick="generateRandomPassword()">
                        {{ _('Generate Random Password') }}<i class="material-icons right">loop</i>
                    </button>
                </div>
                <button class="btn btn-wide waves-effect waves-light" type="submit" name="action">{{ _('Create') }}
                    <i class="material-icons right">add_box</i>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
