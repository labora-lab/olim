{% extends "base.html" %}
{% block title %}Rótulos{% endblock %}

{% block content %}
<div class="row">
    <div class="col card s12">
        {%if queue%}
        <div class="card-content">
            <h5>Pacientes: </h5>
            {%for pid in queue%}
            <a class="btn" href="./patient?id={{pid}}" target="_blank">{{pid}}</a>
            {%endfor%}
        </div>
        <div class="card-content">
            <a class="waves-effect waves-light btn" href="./queue/{{queue_hash}}"><i
                    class="material-icons right">send</i>Ir para a fila</a>
        </div>
        {%else%}
        <div class="card-content">
            <div class="row">
                <form class="col s12" method="post">
                    <div class="row">
                        <div class="input-field col s12">
                            <textarea id="textarea1" name="text" class="materialize-textarea tooltipped"
                                data-tooltip="Separados por virgula, espaços, ponto e virgula ou quebra de linha"></textarea>
                            <label for="textarea1">IDs para fila</label>
                        </div>
                        <div class="col s12">
                            <button class="btn waves-effect waves-light" type="submit" name="action">Gerar fila
                                <i class="material-icons right">send</i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        {%endif%}
    </div>
</div>
{% endblock %}

{% block more_scripts %}
<script>
</script>
{% endblock %}
