<!DOCTYPE html>
<html>

<head>
    <!--Import Google Icon Font-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!--Import materialize.css-->
    <link type="text/css" rel="stylesheet" href="{{url_for('static', filename='css/materialize.min.css')}}" />
    <link type="text/css" rel="stylesheet" href="{{url_for('static', filename='css/styles.css')}}" />

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}{% endblock %} - OLIM - Open Labeller for Iterative Machine learning</title>
</head>

<body>
    <ul id="dropdown1" class="dropdown-content">
        <li><a href="./labels">Rótulos</a></li>
        <li><a href="./hidden">Textos ocultos</a></li>
    </ul>
    <nav>
        <div class="nav-wrapper cyan darken-4">
            <span class="brand-logo left tooltipped" data-tooltip="Open Labeller for Iterative Machine learning">
                OLIM
            </span>
            <ul id="nav-mobile" class="right">
                <li><a href="./">Rotulação</a></li>
                <li><a href="./search">Pesquisa de paciente</a></li>
                <li><a class="dropdown-trigger" href="#!" data-target="dropdown1">Gerenciar<i
                            class="material-icons right">arrow_drop_down</i></a></li>
            </ul>
        </div>
    </nav>
    <div id="warning" class="modal">
        <div class="modal-content">
            <h4 id="warning-title"><i class="material-icons red-text text-darken-2">warning</i> Atenção</h4>
            <p id="warning-text">A bunch of text</p>
        </div>
        <div class="modal-footer">
            <a class="modal-close red darken-3 btn waves-effect waves-red" id="warning-close">Continuar</a>
            <a class="modal-close btn waves-effect waves-green">Sair</a>
        </div>
    </div>
    <div class="container" style="margin-top: 20px;">
        {% block content %}{% endblock %}
    </div>
    <!--JavaScript at end of body for optimized loading-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <script type="text/javascript" src="{{url_for('static', filename='js/jquery.highlight.js')}}"></script>
    <script type="text/javascript" src="{{url_for('static', filename='js/materialize.min.js')}}"></script>
    <script type="text/javascript" src="{{url_for('static', filename='js/scripts.js')}}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
