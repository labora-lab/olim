{% macro highlights_section() %}
<!-- Highlights Section -->
<div class="pt-4">
    <h4 class="text-sm font-medium text-gray-700 mb-3 flex items-center">
        <i class="bi bi-highlighter mr-2"></i>
        {{ _('Highlights') }}
    </h4>
    <div id="highlights-container">
        <input type="text" id="highlight-input" placeholder="{{ _('Add Highlight') }}"
            class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-cyan-500 focus:border-cyan-500 p-2.5">
        <div id="highlights-list" class="mt-2 space-y-1">
            <!-- Dynamic highlight chips will be added here -->
        </div>
    </div>
</div>
{% endmacro %}

{% macro highlights_script() %}
<script>
    // Highlight color palette - cycling through different colors
    const HIGHLIGHT_COLORS = [
        { bg: 'bg-yellow-300', text: 'text-yellow-900', border: 'border-yellow-400' },
        { bg: 'bg-blue-300', text: 'text-blue-900', border: 'border-blue-400' },
        { bg: 'bg-green-300', text: 'text-green-900', border: 'border-green-400' },
        { bg: 'bg-pink-300', text: 'text-pink-900', border: 'border-pink-400' },
        { bg: 'bg-purple-300', text: 'text-purple-900', border: 'border-purple-400' },
        { bg: 'bg-indigo-300', text: 'text-indigo-900', border: 'border-indigo-400' },
        { bg: 'bg-orange-300', text: 'text-orange-900', border: 'border-orange-400' },
        { bg: 'bg-teal-300', text: 'text-teal-900', border: 'border-teal-400' }
    ];

    // Global color assignment tracking
    window.highlightColorAssignments = window.highlightColorAssignments || {};
    window.highlightColorCounter = window.highlightColorCounter || 0;

    function getHighlightColor(term) {
        // If term already has a color assigned, use it
        if (window.highlightColorAssignments[term] !== undefined) {
            return HIGHLIGHT_COLORS[window.highlightColorAssignments[term]];
        }

        // Assign next available color index
        const colorIndex = window.highlightColorCounter % HIGHLIGHT_COLORS.length;
        window.highlightColorAssignments[term] = colorIndex;
        window.highlightColorCounter++;

        return HIGHLIGHT_COLORS[colorIndex];
    }

    function highlightText(term) {
        const contentArea = document.querySelector('.prose');
        if (!contentArea || !term) return;

        const color = getHighlightColor(term);
        const regex = new RegExp(`(${escapeRegExp(term)})`, 'gi');
        const walker = document.createTreeWalker(
            contentArea,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );

        const textNodes = [];
        let node;
        while (node = walker.nextNode()) {
            if (regex.test(node.textContent)) {
                textNodes.push(node);
            }
        }

        textNodes.forEach(textNode => {
            const parent = textNode.parentNode;
            if (parent.tagName !== 'MARK') {
                const highlightedHTML = textNode.textContent.replace(regex, `<mark class="${color.bg} ${color.text} px-1 rounded" data-highlight-term="${escapeHtml(term)}">$1</mark>`);
                const temp = document.createElement('div');
                temp.innerHTML = highlightedHTML;

                while (temp.firstChild) {
                    parent.insertBefore(temp.firstChild, textNode);
                }
                parent.removeChild(textNode);
            }
        });
    }

    function unhighlightText(term) {
        const contentArea = document.querySelector('.prose');
        if (!contentArea) return;

        const highlights = contentArea.querySelectorAll(`mark[data-highlight-term="${term}"]`);
        highlights.forEach(mark => {
            const parent = mark.parentNode;
            parent.replaceChild(document.createTextNode(mark.textContent), mark);
            parent.normalize();
        });
    }

    function updateHighlightSession() {
        const chips = document.querySelectorAll('#highlights-list [data-term]');
        const terms = Array.from(chips).map(chip => chip.dataset.term);

        // Create session data with terms and their color assignments
        const sessionData = {
            terms: terms,
            colorAssignments: window.highlightColorAssignments,
            colorCounter: window.highlightColorCounter
        };

        // Send update to server via commands endpoint
        const params = new URLSearchParams({
            cmd: 'update-session',
            parameter: 'highlight',
            data: JSON.stringify(sessionData)
        });

        fetch('/commands?' + params.toString())
            .catch(console.error);
    }

    function initEntryHighlight(highlightData) {
        const container = document.getElementById('highlights-list');
        const input = document.getElementById('highlight-input');
        if (!container || !input) return;

        console.log('Initializing highlights with data:', highlightData);

        let terms = [];

        // Handle both old format (array of terms) and new format (object with color data)
        if (Array.isArray(highlightData)) {
            // Legacy format: just an array of terms
            terms = highlightData;
        } else if (highlightData.terms && Array.isArray(highlightData.terms)) {
            // New format: object with terms and color assignments
            terms = highlightData.terms;

            // Restore color assignments and counter
            if (highlightData.colorAssignments) {
                window.highlightColorAssignments = highlightData.colorAssignments;
            }
            if (highlightData.colorCounter !== undefined) {
                window.highlightColorCounter = highlightData.colorCounter;
            }
        } else {
            return; // Invalid format
        }

        // Initialize existing highlights
        terms.forEach(term => {
            addHighlightChip(term);
            highlightText(term);
        });

        // Handle adding new highlights
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim()) {
                e.preventDefault();
                const term = this.value.trim();

                // Only proceed if the chip was actually added (not a duplicate)
                const chipAdded = addHighlightChip(term);
                if (chipAdded) {
                    highlightText(term);
                    updateHighlightSession();
                }

                this.value = '';
            }
        });
    }

    function addHighlightChip(term) {
        const container = document.getElementById('highlights-list');
        if (!container) return;

        // Check if term already exists
        const existingChip = container.querySelector(`[data-term="${term}"]`);
        if (existingChip) {
            // Term already exists - highlight the existing chip and show feedback
            highlightExistingChip(existingChip, term);
            return false; // Indicate that no new chip was added
        }

        // Get the assigned color for this term
        const color = getHighlightColor(term);

        // Convert highlight colors to chip colors (lighter versions)
        const chipColorMap = {
            'bg-yellow-300': { bg: 'bg-yellow-100', text: 'text-yellow-800', border: 'border-yellow-300', hover: 'text-yellow-600 hover:text-yellow-800' },
            'bg-blue-300': { bg: 'bg-blue-100', text: 'text-blue-800', border: 'border-blue-300', hover: 'text-blue-600 hover:text-blue-800' },
            'bg-green-300': { bg: 'bg-green-100', text: 'text-green-800', border: 'border-green-300', hover: 'text-green-600 hover:text-green-800' },
            'bg-pink-300': { bg: 'bg-pink-100', text: 'text-pink-800', border: 'border-pink-300', hover: 'text-pink-600 hover:text-pink-800' },
            'bg-purple-300': { bg: 'bg-purple-100', text: 'text-purple-800', border: 'border-purple-300', hover: 'text-purple-600 hover:text-purple-800' },
            'bg-indigo-300': { bg: 'bg-indigo-100', text: 'text-indigo-800', border: 'border-indigo-300', hover: 'text-indigo-600 hover:text-indigo-800' },
            'bg-orange-300': { bg: 'bg-orange-100', text: 'text-orange-800', border: 'border-orange-300', hover: 'text-orange-600 hover:text-orange-800' },
            'bg-teal-300': { bg: 'bg-teal-100', text: 'text-teal-800', border: 'border-teal-300', hover: 'text-teal-600 hover:text-teal-800' }
        };

        const chipColor = chipColorMap[color.bg];

        const chip = document.createElement('div');
        chip.className = `inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${chipColor.bg} ${chipColor.text} border ${chipColor.border}`;
        chip.innerHTML = `
        <span>${escapeHtml(term)}</span>
        <button type="button" onclick="removeHighlight('${escapeHtml(term)}')" class="ml-2 ${chipColor.hover}">
            <i class="bi bi-x"></i>
        </button>
    `;
        chip.dataset.term = term;
        container.appendChild(chip);
        return true; // Indicate that a new chip was added
    }

    function highlightExistingChip(chipElement, term) {
        // Add a pulsing animation to draw attention to the existing chip
        chipElement.style.animation = 'pulse 0.6s ease-in-out 2';

        // Show a subtle notification
        if (typeof showToast === 'function') {
            showToast(`"${term}" is already highlighted`, 'warning');
        }

        // Remove animation after it completes
        setTimeout(() => {
            chipElement.style.animation = '';
        }, 1200);
    }

    function removeHighlight(term) {
        const container = document.getElementById('highlights-list');
        const chip = container.querySelector(`[data-term="${term}"]`);
        if (chip) {
            chip.remove();
            unhighlightText(term);

            // Clean up color assignment for removed term
            delete window.highlightColorAssignments[term];

            updateHighlightSession();
        }
    }

    // Make functions globally available
    window.addHighlight = addHighlightChip;
    window.removeHighlight = removeHighlight;
    window.initEntryHighlight = initEntryHighlight;
</script>

<style>
    @keyframes pulse {

        0%,
        100% {
            transform: scale(1);
            opacity: 1;
        }

        50% {
            transform: scale(1.05);
            opacity: 0.8;
        }
    }
</style>
{% endmacro %}
