{% macro mobile_header() %}
<!-- Mobile Header -->
<div class="sm:hidden bg-gray-800 p-4 flex items-center justify-between">
    <button id="sidebar-toggle" class="text-gray-300 hover:text-white">
        <i class="bi bi-list text-xl"></i>
    </button>
    <div class="flex items-center">
        <img src="{{ url_for('static', filename='classification.png') }}" alt="OLIM Logo" class="w-6 h-6 mr-2">
        <span class="text-lg font-semibold text-white">OLIM</span>
    </div>
</div>
{% endmacro %}

{% macro mobile_backdrop() %}
<!-- Mobile sidebar backdrop -->
<div id="sidebar-backdrop" class="fixed inset-0 z-30 bg-gray-900/50 hidden sm:hidden"></div>
{% endmacro %}

{% macro default_content() %}
<div class="h-96 flex justify-center items-center">
    <div class="text-center">
        <img src="{{ url_for('static', filename='classification.png') }}" alt="OLIM Logo"
            class="w-24 h-24 mb-4 mx-auto">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">OLIM</h1>
        <p class="text-gray-600">{{ _('Open Labeller for Iterative Machine learning') }}</p>
    </div>
</div>
{% endmacro %}
