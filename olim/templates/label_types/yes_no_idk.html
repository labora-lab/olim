<!-- Yes/No/Don't Know label template -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-1 lg:grid-cols-2 gap-2">
    {% for label_str, type, icon, color in label_config %}
    <!-- Selected State Button -->
    <button type="button" onclick="addEntryLabel({{ entry.id }}, {{ label.id }}, '')"
        id="{{ label_str | replace(' ', '_') }}_unsel_{{ label.id }}"
        data-tooltip-target="tooltip-unsel-{{ label.id }}-{{ loop.index }}" data-tooltip-placement="top"
        class="relative inline-flex items-center justify-center px-3 py-2.5 text-sm font-medium text-white bg-{{ color }}-600 border-2 border-{{ color }}-600 rounded-lg hover:bg-{{ color }}-700 hover:border-{{ color }}-700 focus:outline-none focus:ring-2 focus:ring-{{ color }}-200 transition-all duration-200 shadow-sm{% if labels_values.get(label.id) != label_str %} hidden{% endif %}">
        {% if type == 'text' %}
        <span class="font-bold mr-2">{{ icon }}</span>
        {% else %}
        <i class="bi bi-{{ icon }} mr-2"></i>
        {% endif %}
        <span>{{ label_str }}</span>
    </button>
    <div id="tooltip-unsel-{{ label.id }}-{{ loop.index }}" role="tooltip"
        class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white bg-gray-900 rounded-lg shadow-xs opacity-0 tooltip">
        {{ _('Click to unmark as "{label_str}"').format(label_str=label_str) }}
        <div class="tooltip-arrow" data-popper-arrow></div>
    </div>

    <!-- Unselected State Button -->
    <button type="button" onclick="addEntryLabel({{ entry.id }}, {{ label.id }}, '{{ label_str }}')"
        id="{{ label_str | replace(' ', '_') }}_sel_{{ label.id }}"
        data-tooltip-target="tooltip-sel-{{ label.id }}-{{ loop.index }}" data-tooltip-placement="top"
        class="inline-flex items-center justify-center px-3 py-2.5 text-sm font-medium text-gray-700 bg-white border-2 border-gray-300 rounded-lg hover:bg-{{ color }}-50 hover:border-{{ color }}-300 hover:text-{{ color }}-700 focus:outline-none focus:ring-2 focus:ring-{{ color }}-200 transition-all duration-200 shadow-sm{% if labels_values.get(label.id) == label_str %} hidden{% endif %}">
        {% if type == 'text' %}
        <span class="font-bold mr-2 opacity-60">{{ icon }}</span>
        {% else %}
        <i class="bi bi-{{ icon }} mr-2 opacity-60"></i>
        {% endif %}
        <span>{{ label_str }}</span>
        <i class="bi bi-circle ml-2 text-gray-400"></i>
    </button>
    <div id="tooltip-sel-{{ label.id }}-{{ loop.index }}" role="tooltip"
        class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white bg-gray-900 rounded-lg shadow-xs opacity-0 tooltip">
        {{ _('Click to mark as "{label_str}"').format(label_str=label_str) }}
        <div class="tooltip-arrow" data-popper-arrow></div>
    </div>
    {% endfor %}
</div>
