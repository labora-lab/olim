<!-- Open Text label template with self-contained JavaScript -->
<div class="grid grid-cols-1 gap-2">
    <!-- Current text value display (if exists) -->
    {% set current_value = labels_values.get(label.id, '') %}

    <!-- Show current value if it exists -->
    <div id="current_value_{{ label.id }}" {% if not current_value %}style="display: none;"{% endif %}>
        <div class="inline-flex items-center justify-center px-3 py-2.5 text-sm font-medium text-white bg-blue-600 border-2 border-blue-600 rounded-lg shadow-sm">
            <i class="bi bi-chat-text mr-2"></i>
            <span id="current_text_{{ label.id }}">{{ current_value }}</span>
            <button type="button" onclick="clearOpenTextLabel({{ entry.id }}, {{ label.id }})"
                class="ml-2 text-blue-200 hover:text-white">
                <i class="bi bi-x-circle"></i>
            </button>
        </div>
    </div>

    <!-- Input form (show when no value or when editing) -->
    <div id="input_form_{{ label.id }}" {% if current_value %}style="display: none;"{% endif %}>
        <div class="flex space-x-2">
            <input type="text" id="text_input_{{ label.id }}"
                class="flex-1 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2.5"
                placeholder="{{ _('Enter text...') }}" value="{{ current_value }}">
            <button type="button" onclick="submitOpenTextLabel({{ entry.id }}, {{ label.id }})"
                class="px-4 py-2.5 text-sm font-medium text-white bg-green-600 border border-green-600 rounded-lg hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-200 transition-colors">
                <i class="bi bi-check-circle mr-1"></i>
                {{ _('Save') }}
            </button>
            {% if current_value %}
            <button type="button" onclick="cancelEditOpenText({{ label.id }})"
                class="px-4 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-200 transition-colors">
                <i class="bi bi-x mr-1"></i>
                {{ _('Cancel') }}
            </button>
            {% endif %}
        </div>
    </div>

    <!-- Edit button (show when value exists) -->
    <div id="edit_button_{{ label.id }}" {% if not current_value %}style="display: none;"{% endif %}>
        <button type="button" onclick="editOpenTextLabel({{ label.id }})"
            class="inline-flex items-center justify-center px-3 py-2.5 text-sm font-medium text-gray-700 bg-white border-2 border-gray-300 rounded-lg hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-200 transition-all duration-200 shadow-sm">
            <i class="bi bi-pencil mr-2"></i>
            {{ _('Edit') }}
        </button>
    </div>
</div>

<script>
// Self-contained JavaScript for open text functionality
function submitOpenTextLabel(entryId, labelId) {
    const input = document.getElementById('text_input_' + labelId);
    const text = input.value.trim();

    if (!text) {
        return; // Don't submit empty text
    }

    // Submit the label value using the existing addEntryLabel function
    addEntryLabel(entryId, labelId, text);

    // Update the UI
    document.getElementById('current_text_' + labelId).textContent = text;
    document.getElementById('current_value_' + labelId).style.display = 'block';
    document.getElementById('input_form_' + labelId).style.display = 'none';
    document.getElementById('edit_button_' + labelId).style.display = 'block';
}

function clearOpenTextLabel(entryId, labelId) {
    // Clear the label value using the existing addEntryLabel function with empty string
    addEntryLabel(entryId, labelId, '');

    // Update the UI
    document.getElementById('current_value_' + labelId).style.display = 'none';
    document.getElementById('input_form_' + labelId).style.display = 'block';
    document.getElementById('edit_button_' + labelId).style.display = 'none';
    document.getElementById('text_input_' + labelId).value = '';
}

function editOpenTextLabel(labelId) {
    // Show the input form and hide current value display
    document.getElementById('input_form_' + labelId).style.display = 'block';
    document.getElementById('current_value_' + labelId).style.display = 'none';
    document.getElementById('edit_button_' + labelId).style.display = 'none';

    // Focus on the input field
    document.getElementById('text_input_' + labelId).focus();
}

function cancelEditOpenText(labelId) {
    // Hide the input form and show current value display
    document.getElementById('input_form_' + labelId).style.display = 'none';
    document.getElementById('current_value_' + labelId).style.display = 'block';
    document.getElementById('edit_button_' + labelId).style.display = 'block';

    // Reset the input value to the current value
    const currentText = document.getElementById('current_text_' + labelId).textContent;
    document.getElementById('text_input_' + labelId).value = currentText;
}

// Add enter key support for text input
document.addEventListener('DOMContentLoaded', function() {
    const inputs = document.querySelectorAll('input[id^="text_input_"]');
    inputs.forEach(function(input) {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const labelId = input.id.replace('text_input_', '');
                const entryId = {{ entry.id }};
                submitOpenTextLabel(entryId, labelId);
            }
        });
    });
});
</script>
