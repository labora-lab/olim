<div class="card">
    <div class="card-content no-bottom-pad text-entry">
        <h5>{{res['_source']['text']}}</h5>
        <ul>
            {% for key in res['_source'].keys() %}
            {% if key != 'text' %}
            <li><b>{{key}}</b>: {{res['_source'][key]}}</li>
            {%endif%}
            {%endfor%}
        </ul>
    </div>
</div>
