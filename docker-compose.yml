x-app-base: &app-base
  image: olim:latest
  volumes:
    - ./:/app
  networks:
    - olim-es
  restart: unless-stopped

services:
  es:
    container_name: olim_es
    image: docker.elastic.co/elasticsearch/elasticsearch:8.7.0
    volumes:
      - data:/usr/share/elasticsearch/data
    environment:
      - node.name=olim_es
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    mem_limit: 4G
    restart: unless-stopped
    networks:
      - olim-es

  olim:
    <<: *app-base
    container_name: olim
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - 42000:42000
    environment:
      - ES_SERVER=http://olim_es:9200
      - DEBUG=true
      - LEARNER_URL=http://olim-learner:42010
      # Run `docker compose exec olim-learner uv run flask --app api app-keys new data/sample_data.csv text_id text`
      # on the learner directory to upload data to it and get the key
      - LEARNER_KEY=
      - LABELS=LabelTypes.YES_NO
      - HELP_URL=
      - REDIS_HOST=olim_redis

  redis:
    container_name: olim_redis
    image: redis:latest
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '${REDIS_PORT-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - olim-es

  worker:
    <<: *app-base
    container_name: olim_worker
    command: celery -A olim.celery_app worker --loglevel=info
    environment:
      - REDIS_HOST=olim_redis
    depends_on:
      - redis
      - es

volumes:
  data:
    driver: local

networks:
  olim-es:
    driver: bridge
    # Uncoment this network if you are running the learner on the same machine on Docker
    # Be aware of the indentation "external: true" should be one level below "olim-learner_main"
    # olim-learner_main:
    #   external: true
