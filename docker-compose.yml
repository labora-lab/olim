version: '3.5'

services:
  es:
    container_name: olim_es
    image: docker.elastic.co/elasticsearch/elasticsearch:8.7.0
    volumes:
      - data:/usr/share/elasticsearch/data
    environment:
      - node.name=olim_es
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    mem_limit: 4G
    restart: unless-stopped
    networks:
      - main-net

  olim:
    image: olim
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - 42000:42000
    environment:
      - ES_SERVER=http://olim_es:9200
      - DEBUG=true
      - BACKEND_URL=http://olim-backend:42010
      - BACKEND_KEY=zACPf77y9fbeWMnLh01ypF9DUhZODCLO
      - LABELS=LABELS_TYPES.YES_NO_IDK
    volumes:
      - ./:/app
    restart: unless-stopped
    networks:
      - main-net

volumes:
  data:
    driver: local

networks:
  main-net:
    driver: bridge