services:
  es:
    container_name: olim_es
    image: docker.elastic.co/elasticsearch/elasticsearch:8.7.0
    volumes:
      - data:/usr/share/elasticsearch/data
    environment:
      - node.name=olim_es
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    mem_limit: 4G
    restart: unless-stopped
    networks:
      - olim-es

  olim:
    image: olim
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - 42000:42000
    volumes:
      - .:/app
    environment:
      - ES_SERVER=http://olim_es:9200
      - DEBUG=true
      - LEARNER_URL=http://olim-learner:42010
      - LEARNER_KEY=Ibg7VbpTPd0VgKWIGFnEj1k2bNH3ZwBy
      - LABELS=LABELS_TYPES.YES_NO
    restart: unless-stopped
    networks:
      - olim-es
      - olim-learner_main

volumes:
  data:
    driver: local

networks:
  olim-es:
    driver: bridge
  # Uncoment this network if you are running the learner on the same machine on Docker
  olim-learner_main:
    external: true
