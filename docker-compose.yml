x-app-base: &app-base
  image: olim:latest
  volumes:
    - ./:/app
    # - worker-data:/app/work
    # - ./data:/app/data
  networks:
    - olim-es
  depends_on:
    - db
  restart: unless-stopped

# Environments
x-app-env: &app-env
  DB_HOST: "olim_db"
  DB_NAME: "${POSTGRES_DB}"
  DB_USER: "${POSTGRES_USER}"
  DB_PASSWORD: "${POSTGRES_PASSWORD}"
  DB_PORT: "5432"
  DEBUG: "${DEBUG:-false}"
  ES_SERVER: "http://olim_es:9200"
  LEARNER_URL: "http://olim-learner:42010"
  LEARNER_KEY: ""
  LABELS: "LabelTypes.YES_NO"
  HELP_URL: ""
  REDIS_HOST: "olim_redis"

services:
  es:
    container_name: olim_es
    image: docker.elastic.co/elasticsearch/elasticsearch:8.7.0
    volumes:
      - es-data:/usr/share/elasticsearch/data
    environment:
      - node.name=olim_es
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
    mem_limit: 4G
    restart: unless-stopped
    networks:
      - olim-es

  db:
    container_name: olim_db
    image: postgres:15-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - olim-es
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  olim:
    <<: *app-base
    container_name: olim
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - 42000:42000
    environment:
      <<: *app-env

  redis:
    container_name: olim_redis
    image: redis:latest
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - '${REDIS_PORT-6379}:6379'
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - olim-es

  worker:
    <<: *app-base
    container_name: olim_worker
    command: celery -A olim.celery_app worker --loglevel=info
    entrypoint: "" # Skips entrypoint script
    environment:
      <<: *app-env
    depends_on:
      - redis
      - es
      - db

volumes:
  es-data:
    driver: local
  postgres-data:
    driver: local
  worker-data:
    driver: local
  redis-data:
    driver: local

networks:
  olim-es:
    driver: bridge
