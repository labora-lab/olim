{% extends "base.html" %}
{% block title %}Index{% endblock %}
{% block content %}
<div class="row">
    <div class="col s8">
        <div class="card">
            <div class="card-content no-bottom-pad">
                <div class="row">
                    <form action="/patient" method="get">
                        <div class="input-field col s12">
                            <input id="id" name="id" type="text" class="validate" value="{{patient_id}}">
                            <label for="id">Id do paciente</label>
                        </div>
                        <div class="input-field col s6">
                            <span class="right clear">
                                <a class='btn-floating btn btn-flat waves-ligh tooltipped' data-position="bottom"
                                    data-tooltip="Limpar data" onclick="clear_date('start-date');">
                                    <i class="material-icons grey-text text-darken-4">clear</i>
                                </a>
                            </span>
                            <input type="text" name="start-date" id="start-date" class="datepicker"
                                value="{{start_date}}">
                            <label for="start">Data inicio</label>
                        </div>
                        <div class="input-field col s6">
                            <span class="right clear">
                                <a class='btn-floating btn btn-flat waves-ligh tooltipped' data-position="bottom"
                                    data-tooltip="Limpar data" onclick="clear_date('end-date');">
                                    <i class="material-icons grey-text text-darken-4">clear</i>
                                </a>
                            </span>
                            <input type="text" name="end-date" id="end-date" class="datepicker" value="{{end_date}}">
                            <label for="end">Data fim</label>
                        </div>
                        <div class="input-field col s12">
                            <input type="hidden" name="show-hidden" id="show-hidden" value="{{show_hidden}}">
                            <button class="btn waves-effect waves-light btn-wide" type="submit">Pesquisar
                                <i class="material-icons right">search</i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col s12">
                {% block patient %}{% endblock %}
            </div>
        </div>
    </div>
    <div class="col s2">
        <div class="toc-wrapper pinned" style="width: 250px;">
            <h5>Rotulação</h5>
            <div class="row">
                <form>
                    <div class="input-field col s12 tight-top">
                        <label>
                            <input type="checkbox" />
                            <span>Nada relevante</span>
                        </label>
                    </div>
                    <div class="input-field col s12">
                        <label>
                            <input type="checkbox" />
                            <span>Cardiopatia</span>
                        </label>
                    </div>
                    <div class="input-field col s12">
                        <label>
                            <input type="checkbox" />
                            <span>Reinfecção</span>
                        </label>
                    </div>
                    <div class="input-field col s12">
                        <label>
                            <input type="checkbox" />
                            <span>Outros</span>
                        </label>
                    </div>
                    <div class="col s12">&nbsp;</div>
                    <div class="input-field col s9 l10">
                        <input id="first_name" type="text">
                        <label for="first_name">Novo Rótulo</label>
                    </div>
                    <div class="input-field col s3 l2 center">
                        <button class="btn waves-effect waves-light btn-narrow" type="submit" name="action">
                            <i class="material-icons right">add</i>
                        </button>
                    </div>
                    <div class="input-field col s12 tight-top">
                        <button class="btn waves-effect waves-light btn-wide" type="submit" name="action">Salvar
                            <i class="material-icons right">save</i>
                        </button>
                    </div>
                </form>
                <div class="input-field col s12 tight-top">
                    <button
                        class="btn waves-effect waves-light btn-wide hidden-entry{% if show_hidden %} hidden{% endif %}"
                        onclick='toggle_hidden(true)'>
                        Exibir ocultos
                        <i class="material-icons right">remove_red_eye</i>
                    </button>
                    <button
                        class="btn btn-hide waves-effect waves-light btn-wide red darken-4 hidden-entry{% if not show_hidden %} hidden{% endif %}"
                        onclick='toggle_hidden(false)'>
                        Esconder ocultos
                        <i class="material-icons right">remove_red_eye</i>
                    </button>
                </div>
                <div class="input-field col s12 tight-top">
                    <button class="btn waves-effect waves-light btn-wide" onclick='expand_all(true)'>
                        Expandir todos
                        <i class="material-icons right">add</i>
                    </button>
                </div>
                <div class="input-field col s12 tight-top">
                    <button class="btn waves-effect waves-light btn-wide" onclick='retract_all(false)'>
                        Recolher todos
                        <i class="material-icons right">remove</i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    $(document).ready(function () {
        let language = {
            months: ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"],
            monthsShort: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"],
            weekdays: ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sabado"],
            weekdaysShort: ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sab"],
            weekdaysAbbrev: ["D", "S", "T", "Q", "Q", "S", "S"],
            cancel: "Cancelar",
            clear: "Limpar"
        };

        $('#start-date').datepicker({
            firstDay: true,
            format: 'dd/mm/yyyy',
            yearRange: [2020, 2023],
            defaultDate: datestr("{{start_date}}"),
            setDefaultDate: true,
            autoClose: true,
            showClearBtn: true,
            i18n: language
        });

        $('#end-date').datepicker({
            firstDay: true,
            format: 'dd/mm/yyyy',
            yearRange: [2020, 2023],
            defaultDate: datestr("{{end_date}}"),
            setDefaultDate: true,
            autoClose: true,
            showClearBtn: true,
            i18n: language
        });

    });
</script>
{% endblock %}
