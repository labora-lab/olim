<!DOCTYPE html>
<html>

<head>
    <!--Import Google Icon Font-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!--Import materialize.css-->
    <link type="text/css" rel="stylesheet" href="{{url_for('static', filename='css/materialize.min.css')}}" />
    <link type="text/css" rel="stylesheet" href="{{url_for('static', filename='css/styles.css')}}" />

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}{% endblock %} - Projeto OPAS</title>
</head>

<body>
    <nav>
        <div class="nav-wrapper cyan darken-4">
            <span class="brand-logo left">Projeto OPAS</span>
            <ul id="nav-mobile" class="right">
                <li><a href="./">Rotulação</a></li>
                <li><a href="./search">Pesquisa de paciente</a></li>
            </ul>
        </div>
    </nav>
    <div class="container" style="margin-top: 20px;">
        {% block content %}{% endblock %}
    </div>
    <!--JavaScript at end of body for optimized loading-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <script type="text/javascript" src="{{url_for('static', filename='js/materialize.min.js')}}"></script>
    <script type="text/javascript" src="{{url_for('static', filename='js/scripts.js')}}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
